# Render Blueprint - https://render.com/docs/blueprint-spec
# Deploys the backend (Node web service) and frontend (static site).
# You still need to provide MONGODB_URI (e.g. a MongoDB Atlas connection string)
# and, on the frontend, point VITE_API_BASE_URL at the deployed backend URL.
services:
  - type: web
    name: ide-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: ide-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
