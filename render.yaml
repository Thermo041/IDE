# Render Blueprint - https://render.com/docs/blueprint-spec
# Single web service: builds the React frontend and runs the Express backend,
# which serves the built frontend from the same URL.
# Provide MONGODB_URI (e.g. a MongoDB Atlas connection string) in the dashboard.
services:
  - type: web
    name: code-ide
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
